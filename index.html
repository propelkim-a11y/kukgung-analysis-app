<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>활터에 있소 - 국궁 다각도 자세 분석</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 권한 및 기기 시작 팝업 -->
    <div id="permission-overlay" class="overlay">
        <div class="overlay-content">
            <h2>🏹 활터에 있소</h2>
            <p>정밀한 국궁 자세 분석을 위해<br>카메라 및 센서 권한이 필요합니다.</p>
            <button id="btn-permission">권한 허용 및 시작하기</button>
        </div>
    </div>

    <div class="container">
        <!-- 상단 헤더: 촬영 모드 수평계용 (분석 모드 진입 시 자동 가림) -->
        <header class="header" id="shoot-header">
            <div id="status-text">장치 준비 중</div>
            <div id="angle-text">0.0°</div>
        </header>

        <!-- 메인 콘텐츠 화면 -->
        <main class="main-content">
            <!-- [1] 촬영 모드 섹션 -->
            <div id="camera-section" class="view-section">
                <div class="video-wrapper">
                    <video id="video-preview" autoplay playsinline muted></video>
                    <div id="level-container" class="level-container">
                        <div class="center-target"></div>
                        <div id="level-line" class="level-line"></div>
                    </div>
                </div>
            </div>

            <!-- [2] 분석 모드 섹션 (완전 투명 영화관 스타일 뷰포트) -->
            <div id="analysis-section" class="view-section hidden">
                <!-- 확대/축소 및 이동을 자유롭게 제어할 동적 월드 컨테이너 생성 -->
                <div id="zoom-viewport" class="zoom-viewport">
                    <div class="canvas-container" id="manual-analysis-box">
                        <canvas id="output-canvas"></canvas>
                        <canvas id="drawing-canvas"></canvas>
                    </div>
                </div>

                <!-- 분석 모드 전용 플로팅 상단 툴 레이어 -->
                <div class="analysis-top-bar">
                    <div id="angle-display" class="angle-badge">선을 드래그하여 그려보세요</div>
                    <div class="result-badge">📐 각도: <span id="res-manual-angle">0.0°</span></div>
                </div>
            </div>
        </main>

        <!-- 하단 컨트롤 영역 (하이브리드 터치 바) -->
        <footer class="footer" id="main-footer">
            <!-- 항상 노출되는 최상위 탭 스위처 -->
            <div class="mode-selector">
                <button id="btn-mode-shoot" class="active">촬영하기</button>
                <button id="btn-mode-analyze">결과보기</button>
            </div>
            
            <!-- [A] 촬영 화면 하단 제어부 -->
            <div id="shoot-controls" class="action-zone">
                <button id="record-btn" aria-label="녹화"></button>
            </div>

            <!-- [B] 분석 화면 전용 플로팅 완전 투명 제어부 -->
            <div id="analyze-controls" class="action-zone hidden">
                <!-- 동적 타임라인 슬라이더 조작 계통 -->
                <div class="timeline-box">
                    <input type="range" id="video-slider" min="0" max="100" step="0.1" value="0">
                </div>
                <!-- 미세 제어 프레임 버튼 패널 -->
                <div class="video-controls">
                    <button id="btn-video-prev" class="control-btn">⏪ -0.1s</button>
                    <button id="btn-video-play" class="control-btn-play">▶️ 재생</button>
                    <button id="btn-video-next" class="control-btn">⏩ +0.1s</button>
                </div>
                <!-- 기능성 유틸 단추 제어 라인 -->
                <div class="util-btn-group">
                    <label for="file-upload" class="btn-secondary">📂 영상 업로드</label>
                    <input type="file" id="file-upload" accept="video/*" class="hidden">
                    <button id="btn-clear-draw" class="tool-btn">🔄 초기화</button>
                </div>
            </div>
        </footer>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
