<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>국궁 자세 분석 시스템 (Archery Mechanics Analyzer)</title>
    
    <!-- 애플(iOS) 홈 화면 순정 아이콘 인식 태그 -->
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- 갤럭시(Android) 홈 화면 순정 웹앱 인식 매니페스트 등록 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050507">

    <link rel="stylesheet" href="style.css?v=15.0">
</head>
<body>

    <!-- ================================================================= -->
    <!-- [SCENE 1] 촬영 모드 화면 (기본 활성화) -->
    <!-- ================================================================= -->
    <div id="scene-record" class="app-scene active">
        <div class="viewport-container">
            <div id="gyro-horizon-line" data-angle="0.0°"></div>
            <div id="gyro-vertical-line"></div>
            <div class="center-crosshair-v"></div>
            <div class="center-crosshair-h"></div>
            <video id="camera-preview" autoplay playsinline muted></video>
        </div>

        <div class="unified-panel-box">
            <div class="panel-slider-handle-placeholder"></div>
            <div class="panel-content-wrapper">
                <div class="apple-layout-sync-spacer"></div>
                <div id="record-status" class="status-text">화면을 가볍게 터치하면 카메라와 수평계가 가동됩니다.</div>
                <div class="control-row-center">
                    <button id="btn-record-toggle" class="action-btn-main">녹화시작</button>
                </div>
                <nav class="scene-switch-bar">
                    <button id="btn-go-analyze" class="switch-btn">분석 화면으로 이동</button>
                </nav>
            </div>
        </div>
    </div>


    <!-- ================================================================= -->
    <!-- [SCENE 2] 분석 모드 화면 -->
    <!-- ================================================================= -->
    <div id="scene-analyze" class="app-scene">
        <div id="video-viewport" class="viewport-container">
            <video id="main-video" playsinline muted loop></video>
            <canvas id="draw-canvas"></canvas>
            <div id="angle-report" class="floating-report">ANGLE 0.0°</div>
        </div>

        <div id="unified-panel" class="unified-panel-box">
            <div id="panel-handle" class="panel-slider-handle">
                <div class="handle-bar"></div>
            </div>

            <div class="panel-content-wrapper">
                <nav class="text-menu-bar">
                    <button id="btn-open" class="menu-btn">열기</button>
                    <button id="btn-move" class="menu-btn">확대</button>
                    <button id="btn-draw" class="menu-btn">선긋기</button>
                    <button id="btn-reset" class="menu-btn">초기화</button>
                </nav>

                <div class="timeline-container">
                    <input type="range" id="video-slider" min="0" max="100" value="0" step="0.1">
                </div>

                <div class="video-control-bar">
                    <button id="btn-frame-prev" class="control-btn">뒤로</button>
                    <button id="btn-play-pause" class="control-btn">재생</button>
                    <button id="btn-frame-next" class="control-btn">앞으로</button>
                </div>

                <nav class="scene-switch-bar">
                    <button id="btn-go-record" class="switch-btn">촬영 화면으로 이동</button>
                </nav>
            </div>
        </div>
    </div>

    <input type="file" id="video-input" accept="video/*" style="display: none;">

    <!-- 💡 코어 스크립트 구동 동기화 라인 정비 (순서 꼬임 버그 완전 파괴) -->
    <script src="js/sensor.js?v=15.0"></script>
    <script src="js/analyzer.js?v=15.0"></script>
    <script src="js/app_core.js?v=15.0"></script>
    <script src="js/app_gesture.js?v=15.0"></script>
    <script src="js/app.js?v=15.0"></script>

    <!-- 갤럭시/아이폰 웹앱 독립 공인화 서비스 워커 등록부 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const repoPath = window.location.pathname.endsWith('/') ? window.location.pathname : window.location.pathname + '/';
                navigator.serviceWorker.register('sw.js?v=15.0', { scope: repoPath })
                    .then(reg => console.log('[PWA] 서비스 워커 가동 완료:', reg.scope))
                    .catch(err => console.error('[PWA] 서비스 워커 경로 에러:', err));
            });
        }
    </script>
</body>
</html>
