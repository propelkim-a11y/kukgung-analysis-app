<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>활터에 있소 - 국궁 다각도 자세 분석</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 권한 및 기기 시작 팝업 -->
    <div id="permission-overlay" class="overlay">
        <div class="overlay-content">
            <h2>🏹 활터에 있소</h2>
            <p>정밀한 국궁 자세 분석을 위해<br>카메라 및 센서 권한이 필요합니다.</p>
            <button id="btn-permission">권한 허용 및 시작하기</button>
        </div>
    </div>

    <div class="container">
        <!-- 상단 헤더: 촬영 모드에서만 노출 -->
        <header class="header">
            <div id="status-text">장치 준비 중</div>
            <div id="angle-text">0.0°</div>
        </header>

        <!-- 메인 콘텐츠 화면 -->
        <main class="main-content">
            <!-- 촬영 모드 -->
            <div id="camera-section" class="view-section">
                <div class="video-wrapper">
                    <video id="video-preview" autoplay playsinline muted></video>
                    <div id="level-container" class="level-container">
                        <div class="center-target"></div>
                        <div id="level-line" class="level-line"></div>
                    </div>
                </div>
            </div>

            <!-- 분석 모드 -->
            <div id="analysis-section" class="view-section hidden">
                <!-- 동영상 원본 비율 유지 및 피치 줌 백그라운드 구역 -->
                <div class="canvas-container" id="manual-analysis-box">
                    <canvas id="output-canvas"></canvas>
                    <canvas id="drawing-canvas"></canvas>
                </div>

                <!-- 각도 리포트 좌측 상단 투명 플로팅 크로스 연동 -->
                <div class="top-left-floating-report">
                    <span class="report-icon">📐</span>
                    <span id="res-manual-angle" class="highlight">0.0°</span>
                </div>
            </div>
        </main>

        <!-- [완벽 대통합] 1/3 크기 및 위치가 고정된 하단 반투명 컨트롤러 센터 박스 -->
        <div id="unified-control-center" class="unified-panel">
            
            <!-- ⚡ [신설] 패널을 위아래로 접고 펼칠 수 있는 슬라이딩 드래그 손잡이 바 -->
            <div id="panel-handle" class="panel-drag-handle">
                <div class="handle-bar"></div>
            </div>
            
            <!-- [분석 모드 전용 내부 컴포넌트 라인] -->
            <div id="analysis-components" class="panel-inner-block hidden">
                
                <!-- 실시간 비디오 탐색 슬라이더 바 -->
                <div class="slider-container">
                    <input type="range" id="video-timeline" value="0" min="0" max="100" step="0.01">
                </div>

                <!-- 비디오 미세 탐색 컨트롤러 -->
                <div class="video-controls">
                    <button id="btn-video-prev" class="control-btn">⏪ -0.1s</button>
                    <button id="btn-video-play" class="control-btn">▶️ 재생</button>
                    <button id="btn-video-next" class="control-btn">⏩ +0.1s</button>
                </div>

                <!-- 4대 텍스트 메뉴 단추 탭 바 -->
                <div class="menu-tab-bar">
                    <!-- 1. 열기 -->
                    <div class="analysis-actions">
                        <input type="file" id="file-upload" accept="video/*" class="hidden">
                        <label for="file-upload" id="upload-label" class="menu-tab-btn-txt active">열기</label>
                    </div>
                    
                    <!-- 2. 확대 -->
                    <button id="btn-tool-move" class="menu-tab-btn-txt" aria-label="확대">확대</button>
                    
                    <!-- 3. 선긋기 -->
                    <button id="btn-tool-draw" class="menu-tab-btn-txt" aria-label="선긋기 모드">선긋기</button>
                    
                    <!-- 4. 초기화 -->
                    <button id="btn-clear-draw" class="menu-tab-btn-txt-reset" aria-label="초기화">초기화</button>
                </div>

                <!-- 실시간 로그 안내 히든 데이터 노드 -->
                <div id="angle-display" class="hidden"></div>
            </div>

            <!-- [촬영 모드 전용 내부 컴포넌트 라인] -->
            <div id="shoot-components" class="action-zone">
                <button id="record-btn" aria-label="녹화"></button>
            </div>

            <!-- [공통 내장 최하단 탭 스위치 라인] -->
            <div class="panel-global-footer">
                <div class="mode-selector">
                    <button id="btn-mode-shoot" class="active">촬영하기</button>
                    <button id="btn-mode-analyze">분석하기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 스크립트 엔진 장착 -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
