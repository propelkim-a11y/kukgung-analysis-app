<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>활터에 있소 - 국궁 다각도 자세 분석</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 권한 및 기기 시작 팝업 -->
    <div id="permission-overlay" class="overlay">
        <div class="overlay-content">
            <h2>🏹 활터에 있소</h2>
            <p>정밀한 국궁 자세 분석을 위해<br>카메라 및 센서 권한이 필요합니다.</p>
            <button id="btn-permission">권한 허용 및 시작하기</button>
        </div>
    </div>

    <div class="container">
        <!-- 상단 헤더: 촬영 모드에서만 노출 -->
        <header class="header">
            <div id="status-text">장치 준비 중</div>
            <div id="angle-text">0.0°</div>
        </header>

        <!-- 메인 콘텐츠 화면 -->
        <main class="main-content">
            <!-- 촬영 모드 -->
            <div id="camera-section" class="view-section">
                <div class="video-wrapper">
                    <video id="video-preview" autoplay playsinline muted></video>
                    <div id="level-container" class="level-container">
                        <div class="center-target"></div>
                        <div id="level-line" class="level-line"></div>
                    </div>
                </div>
            </div>

            <!-- 분석 모드 -->
            <div id="analysis-section" class="view-section hidden">
                <!-- 상단 2/3 영역: 동영상 원본 비율 유지 및 피치 줌 영역 -->
                <div class="canvas-container" id="manual-analysis-box">
                    <canvas id="output-canvas"></canvas>
                    <canvas id="drawing-canvas"></canvas>
                </div>
                
                <!-- 하단 1/3 영역: 완전 투명 인터페이스 제어 패널 -->
                <div class="analysis-control-panel">
                    <!-- 툴바 (초기화) -->
                    <div class="tool-bar-inner">
                        <button id="btn-clear-draw" class="tool-btn">🔄 초기화</button>
                        <div id="angle-display" class="angle-badge">두 선을 선택하세요</div>
                    </div>

                    <!-- 실시간 비디오 탐색 슬라이더 바 -->
                    <div class="slider-container">
                        <input type="range" id="video-timeline" value="0" min="0" max="100" step="0.01">
                    </div>

                    <!-- 비디오 미세 탐색 컨트롤러 -->
                    <div class="video-controls">
                        <button id="btn-video-prev" class="control-btn">⏪ -0.1s</button>
                        <button id="btn-video-play" class="control-btn">▶️ 재생</button>
                        <button id="btn-video-next" class="control-btn">⏩ +0.1s</button>
                    </div>

                    <!-- 분석 결과창 및 파일 업로드 구역 -->
                    <div class="report-box">
                        <div class="report-item main-result">
                            <span>📐 선택한 두 선의 각도</span>
                            <span id="res-manual-angle" class="highlight">0.0°</span>
                        </div>
                        <div class="analysis-actions">
                            <input type="file" id="file-upload" accept="video/*" class="hidden">
                            <label for="file-upload" id="upload-label" class="btn-secondary">📁 영상 파일 업로드 분석</label>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 최하단 모드 탭 컨트롤바 (촬영 모드에서 제어) -->
        <footer class="footer">
            <div class="mode-selector">
                <button id="btn-mode-shoot" class="active">촬영하기</button>
                <button id="btn-mode-analyze">결과보기</button>
            </div>
            <div class="action-zone">
                <button id="record-btn" aria-label="녹화"></button>
            </div>
        </footer>
    </div>

    <!-- 스크립트 엔진 장착 -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
