<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>국궁 자세 분석 시스템 - 국궁 (Archery Mechanics Analyzer) 자세 분석 시스템</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- [SCENE 1] 인트로 진입 화면 레이어 -->
  <div id="scene-intro" class="app-scene active">
    <div class="intro-glass-panel">
      <div class="intro-header">
        <div class="intro-subtitle">ARCHERY MECHANICS ANALYZER</div>
        <h1 class="intro-title">궁체 분석 시스템</h1>
      </div>
      <div class="intro-center-logo">
        <div class="logo-neon-ring"></div>
        <div id="intro-训-display" class="logo-core">인애덕행</div>
      </div>
      <div class="intro-action-container">
        <p class="intro-notice-text">실시간 하드웨어 자이로 역보정 엔진 대기 중</p>
        <button id="btn-start-app" class="action-btn-main neon-pulse-target">시스템 시작하기</button>
        
        <!-- 하단 메타데이터 정렬 통합 그룹 -->
        <div class="intro-metadata-group">
          <span class="meta-copyright">
            © 2026 해현-활터왔소. All Rights Reserved.
            <!-- 💡 저작권 라인 안의 실시간 조회수 카운터 -->
            <span id="global-view-count">Views: --</span>
          </span>
          <span class="meta-version">Ver 6.53 (Stable)</span>
        </div>
      </div>
    </div>
  </div>

  <!-- [SCENE 2] 분석 모드 화면 레이어 (🚨 유실되었던 컨트롤러 핵심 인프라 전면 복구) -->
  <div id="scene-analyze" class="app-scene">
    <div id="video-viewport" class="viewport-container">
      <video id="main-video" playsinline muted loop></video>
      <canvas id="draw-canvas"></canvas>

      <!-- 비디오 화면 위에 겹쳐서 실시간 데이터를 노출할 각도 리포트 영역 -->
      <div id="angle-report" class="angle-overlay">
        <div style="color:#aaa;">분석 대기 중</div>
      </div>
    </div>

    <!-- 📊 [복구] 하단 비디오 타임라인 조작 및 기능 제어 바 영역 -->
    <div class="control-panel-bar" style="width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(15,15,20,0.85); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.05); z-index: 100;">
      <div class="control-left-group" style="display: flex; gap: 12px;">
        <button id="btn-play-toggle" style="background: transparent; border: 1px solid #00FF66; color: #00FF66; padding: 6px 16px; border-radius: 20px; font-weight: 600; cursor: pointer;">재생 / 일시정지</button>
        <button id="btn-reset-analysis" style="background: transparent; border: 1px solid #86868b; color: #86868b; padding: 6px 16px; border-radius: 20px; cursor: pointer;">초기화</button>
      </div>
      <div class="control-right-group">
        <span style="font-size: 12px; color: #86868b;">하드웨어 센서 연동 중</span>
      </div>
    </div>
  </div>

  <!-- 마스터 비즈니스 로직 제어 스크립트 엔진 바인딩 -->
  <script src="js/app.js"></script>
</body>
</html>
