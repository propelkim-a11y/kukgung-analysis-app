<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>활터에 있소 - 국궁 다각도 자세 분석</title>
    <link rel="stylesheet" href="style.css">
    <!-- MediaPipe Pose 필수 라이브러리 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- iOS 센서 및 카메라 권한 팝업 -->
    <div id="permission-overlay" class="overlay">
        <div class="overlay-content">
            <h2>🏹 활터에 있소</h2>
            <p>정밀한 국궁 자세 및 고각 분석을 위해<br>카메라 및 수평계 권한이 필요합니다.</p>
            <button id="btn-permission">권한 허용 및 시작하기</button>
        </div>
    </div>

    <div class="container">
        <!-- 상단 헤더: 수평계 상태 표시 -->
        <header class="header">
            <div id="status-text">삼각대 수평을 맞춰주세요</div>
            <div id="angle-text">좌우 기울기: 0.0°</div>
            <div id="sync-badge" class="badge">동기화 대기</div>
        </header>

        <!-- 메인 콘텐츠 화면 -->
        <main class="main-content">
            <!-- 촬영 모드 (수평 가이드 오버레이 포함) -->
            <div id="camera-section" class="view-section">
                <div class="video-wrapper">
                    <video id="video-preview" autoplay playsinline muted></video>
                    <div class="level-container">
                        <div class="center-target"></div>
                        <div id="level-line" class="level-line"></div>
                    </div>
                </div>
            </div>

            <!-- 분석 모드 (결과 리포트 화면) -->
            <div id="analysis-section" class="view-section hidden">
                <h3>🏹 만작(Full Draw) 상태 분석 결과</h3>
                <div class="canvas-container">
                    <canvas id="output-canvas"></canvas>
                    <div id="loading-spinner" class="hidden">
                        <div class="spinner"></div>
                        <p>AI 자세 분석 중...</p>
                    </div>
                </div>
                <div class="report-box">
                    <div class="report-item">
                        <span>🎯 화살 예상 고각</span>
                        <span id="res-arrow-angle" class="highlight">0°</span>
                    </div>
                    <div class="report-item">
                        <span>💪 줌팔 각도</span>
                        <span id="res-bow-arm" class="highlight">0°</span>
                    </div>
                    <div class="report-item">
                        <span>🖐️ 깍지팔 각도</span>
                        <span id="res-draw-arm" class="highlight">0°</span>
                    </div>
                    <div id="feedback-text" class="feedback">분석 데이터를 로딩 중입니다...</div>
                </div>
            </div>
        </main>

        <!-- 하단 컨트롤바 -->
        <footer class="footer">
            <div class="mode-selector">
                <button id="btn-mode-shoot" class="active">촬영하기</button>
                <button id="btn-mode-analyze">결과보기</button>
            </div>
            <div class="action-zone">
                <!-- 촬영 버튼 (수평이 맞아야 활성화) -->
                <button id="record-btn" disabled aria-label="녹화"></button>
                <!-- 분석용 파일 업로드 버튼 -->
                <input type="file" id="file-upload" accept="video/*" class="hidden">
                <label for="file-upload" id="upload-label" class="btn-secondary hidden">영상 파일 업로드 분석</label>
            </div>
        </footer>
    </div>

    <!-- 스크립트 로드 -->
    <script src="js/sensor.js"></script>
    <script src="js/firebase-sync.js"></script>
    <script src="js/analyzer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
