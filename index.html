<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>궁체 분석 시스템 (Kukgung AI)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        
        <!-- ===================================================================
             1. 인트로 보드 화면 레이아웃 (Scene 0)
             =================================================================== -->
        <div id="scene-intro" class="app-scene active">
            
            <!-- 상단 헤더 컴포넌트: 국궁 정체성 확립 배경 타이틀 -->
            <div class="intro-header">
                <span class="sub-title">궁체 분석 시스템</span>
                <h1 class="main-title">正弓正矢</h1>
                <p class="welcome-msg">바른 몸가짐에서 바른 화살이 나간다.</p>
            </div>

            <!-- 중앙 주 제어 컴포넌트: 시사 시작 퀵 스타트 트리거 -->
            <div class="intro-content">
				<button id="btn-quick-start" class="quick-start-trigger" type="button" aria-label="시작">
					<div class="glowing-ring"></div>
					<div class="inner-circle">
						<span class="bow-icon" role="img" aria-label="활과 화살">🏹</span>
						<span class="start-text">분석시작</span>
					</div>
				</button>
	            <p class="hint-text">터치하여 분석 모드로 진입합니다</p>
            </div>

            <!-- 하단 푸터 컴포넌트: 릴리즈 버전 명세 및 저작권 식별자 -->
            <div class="intro-footer">
                <p class="app-version">v1.2.0-beta</p>
                <p class="copyright">ⓒ 2026 해현-활터왔소. All rights reserved.</p>
            </div>
            
        </div><!-- #scene-intro END -->

        <!-- ===================================================================
             2. 메인 분석/촬영 화면 레이아웃 (Scene 1)
             =================================================================== -->
        <div id="scene-capture" class="app-scene">
            
            <!-- 상단 하드웨어 동기화 정보 창 -->
            <header class="main-header">
                <div class="status-indicator">
                    <div id="gyro-status" class="status-dot"></div>
                    <span id="status-text">수평 확인 중...</span>
                </div>
                <h2>실시간 자세 분석</h2>
            </header>
            
            <!-- 하드웨어 백버퍼 프레임 디스플레이 컨테이너 -->
            <div class="video-container">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="analysis-overlay"></canvas>
            </div>

            <!-- 하단 글로벌 제어 패널 -->
            <footer class="controls-panel">
                <button id="btn-capture" class="control-btn" type="button">자세 캡처</button>
            </footer>
            
        </div><!-- #scene-capture END -->

    </div><!-- #app-container END -->

    <!-- 시스템 마스터 컨트롤 스크립트 비동기 파이프라인 결속 -->
    <script src="js/app.js" defer></script>
</body>
</html>
