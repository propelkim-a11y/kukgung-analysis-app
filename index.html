<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Arrow Trajectory Simulator</title>
  
  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- 탭 아이콘 및 모바일 웹앱 전용 메타 태그 -->
  <link rel="icon" type="image/png" sizes="32x32" href="icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  
  <!-- CSS 스타일시트 모듈 연동 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="main-screen">
  <h1>Arrow Trajectory</h1>
  
  <!-- 시점 토글 세그먼트 (정면 / 측면 / 평면) -->
  <div class="segmented-control">
    <button class="segment-btn" onclick="changeView('front', this)">정면</button>
    <button class="segment-btn active" onclick="changeView('side', this)">측면</button>
    <button class="segment-btn" onclick="changeView('top', this)">평면</button>
  </div>
  
  <!-- 시뮬레이터 캔버스 컨테이너 -->
  <div class="sim-container">
    <canvas id="simCanvas"></canvas>
    <div class="floating-actions">
      <button class="fire-btn" onclick="fireArrow()">발사</button> 🏹
    </div>
  </div>

  <!-- [상시 고정 패널 컴포넌트 구조 - 내부 스크롤 가이드 탑재] -->
  <div class="persistent-panel-container">
    <!-- [탭 패널 1] 화살 설정 (총 5줄 중 4줄 노출, 터치 스크롤업 가능) -->
    <div class="tab-panel active" id="sheet-arrow">
      <div class="panel-title">화살 설정 (4줄 노출 / 휠·터치 스크롤)</div>
      <div class="form-grid">
        <div class="form-group">
          <label>항력 계수 (Cd)</label>
          <div class="input-wrapper">
            <input type="number" id="dragCoeff" value="0.35" step="0.01">
            <span class="unit">cd</span>
          </div>
        </div>
        <div class="form-group">
          <label>양력 계수 (Cl)</label>
          <div class="input-wrapper">
            <input type="number" id="liftCoeff" value="0.05" step="0.01">
            <span class="unit">cl</span>
          </div>
        </div>
        <div class="form-group">
          <label>화살 무게</label>
          <div class="input-wrapper">
            <input type="number" id="weight" value="25">
            <span class="unit">g</span>
          </div>
        </div>
        <div class="form-group">
          <label>화살 직경 (두께)</label>
          <div class="input-wrapper">
            <input type="number" id="diameter" value="5.5" step="0.1">
            <span class="unit">mm</span>
          </div>
        </div>
        <div class="form-group">
          <label>발사 높이</label>
          <div class="input-wrapper">
            <input type="number" id="launchHeight" value="1.5" step="0.1">
            <span class="unit">m</span>
          </div>
        </div>
      </div>
    </div>

    <!-- [탭 패널 2] 사법 변수 설정 (총 3줄 - 전체 고정 노출) -->
    <div class="tab-panel" id="sheet-shooting">
      <div class="panel-title">사법 변수 설정</div>
      <div class="form-grid">
        <div class="form-group">
          <label>초기 속도</label>
          <div class="input-wrapper">
            <input type="number" id="velocity" value="50">
            <span class="unit">m/s</span>
          </div>
        </div>
        <div class="form-group">
          <label>발사 각도 (수직)</label>
          <div class="input-wrapper">
            <input type="number" id="angle" value="30">
            <span class="unit">°</span>
          </div>
        </div>
        <div class="form-group">
          <label>수평 각도 (방위각)</label>
          <div class="input-wrapper">
            <input type="number" id="yawAngle" value="0">
            <span class="unit">°</span>
          </div>
        </div>
      </div>
    </div>

    <!-- [탭 패널 3] 환경 변수 설정 (총 4줄 - 전체 고정 노출) -->
    <div class="tab-panel" id="sheet-env">
      <div class="panel-title">환경 변수 설정</div>
      <div class="form-grid">
        <div class="form-group">
          <label>종풍 (촉/오늬바람)</label>
          <div class="input-wrapper">
            <input type="number" id="windX" value="0">
            <span class="unit">m/s</span>
          </div>
        </div>
        <div class="form-group">
          <label>횡풍 (옆바람)</label>
          <div class="input-wrapper">
            <input type="number" id="windY" value="0">
            <span class="unit">m/s</span>
          </div>
        </div>
        <div class="form-group">
          <label>과녁 높이</label>
          <div class="input-wrapper">
            <input type="number" id="targetHeight" value="1.3" step="0.1">
            <span class="unit">m</span>
          </div>
        </div>
        <div class="form-group">
          <label>공기 밀도</label>
          <div class="input-wrapper">
            <input type="number" id="airDensity" value="1.225" step="0.001">
            <span class="unit">kg/m³</span>
          </div>
        </div>
      </div>
    </div>

    <!-- [탭 패널 4] 비행 결과 표시 (총 6줄 중 4줄 노출, 터치 스크롤업 가능) -->
    <div class="tab-panel" id="sheet-result">
      <div class="panel-title">비행 결과 (4줄 노출 / 휠·터치 스크롤)</div>
      <div class="form-grid">
        <div class="form-group">
          <label>최대 거리</label>
          <div class="value-wrapper">
            <span id="resMaxDistance" class="result-value">0.00</span>
            <span class="unit">m</span>
          </div>
        </div>
        <div class="form-group">
          <label>최고 높이</label>
          <div class="value-wrapper">
            <span id="resMaxHeight" class="result-value">0.00</span>
            <span class="unit">m</span>
          </div>
        </div>
        <div class="form-group">
          <label>측면 편차</label>
          <div class="value-wrapper">
            <span id="resLateralDeviation" class="result-value">0.00</span>
            <span class="unit">m</span>
          </div>
        </div>
        <div class="form-group">
          <label>비행 시간</label>
          <div class="value-wrapper">
            <span id="resFlightTime" class="result-value">0.00</span>
            <span class="unit">s</span>
          </div>
        </div>
        <div class="form-group">
          <label>충돌 속도</label>
          <div class="value-wrapper">
            <span id="resImpactVelocity" class="result-value">0.00</span>
            <span class="unit">m/s</span>
          </div>
        </div>
        <div class="form-group">
          <label>충돌 에너지</label>
          <div class="value-wrapper">
            <span id="resImpactEnergy" class="result-value">0.00</span>
            <span class="unit">J</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 하단 고정형 탭바 내비게이션 -->
<div class="tab-bar">
  <button class="tab-item active" onclick="switchTab('arrow', this)">
    <span class="tab-icon">🏹</span>
    <span>화살 설정</span>
  </button>
  <button class="tab-item" onclick="switchTab('shooting', this)">
    <span class="tab-icon">🎯</span>
    <span>사법 변수</span>
  </button>
  <button class="tab-item" onclick="switchTab('env', this)">
    <span class="tab-icon">🌍</span>
    <span>환경 변수</span>
  </button>
  <button class="tab-item" onclick="switchTab('result', this)">
    <span class="tab-icon">📊</span>
    <span>비행 결과</span>
  </button>
</div>

<!-- 스크립트 파일 기능별 분할 연동 -->
<script src="ui.js"></script>
<script src="physics.js"></script>
<!-- 서비스 워커 백그라운드 등록 구현 -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('PWA 서비스 워커 등록 완료:', reg.scope))
      .catch(err => console.log('PWA 서비스 워커 등록 실패:', err));
  });
}
</script>
</body>
</html>
