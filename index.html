<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>궁체 분석 시스템 (Kukgung AI)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        
        <!-- 1. 인트로 보드 화면 (Scene 0) -->
        <div id="scene-intro" class="app-scene active">
            <!-- 상단 헤더: 전통 타이포그래피 -->
            <div class="intro-header">
                <span class="sub-title">궁체 분석 시스템</span>
                <h1 class="main-title">正弓正矢</h1>
                <p class="welcome-msg">바른 몸가짐에서 바른 화살이 나갑니다.</p>
            </div>

            <!-- 중앙 콘텐츠: 퀵 스타트 발사 스위치 -->
            <div class="intro-content">
                <button id="btn-quick-start" class="quick-start-trigger">
                    <div class="glowing-ring"></div>
                    <div class="inner-circle">
                        <span class="bow-icon">🏹</span>
                        <span class="start-text">시작</span>
                    </div>
                </button>
                <p class="hint-text">터치하여 분석 모드로 진입합니다</p>
            </div>

            <!-- 하단 푸터: 앱 버전 및 저작권 정보 -->
            <div class="intro-footer">
                <p class="app-version">v1.2.0-beta</p>
                <p class="copyright">© 2026 해현. All rights reserved.</p>
            </div>
        </div>

        <!-- 2. 메인 분석/촬영 화면 (Scene 1) -->
        <div id="scene-capture" class="app-scene">
            <header class="main-header">
                <div class="status-indicator">
                    <div id="gyro-status" class="status-dot"></div>
                    <span id="status-text">수평 확인 중...</span>
                </div>
                <h2>실시간 자세 분석</h2>
            </header>
            
            <div class="video-container">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="analysis-overlay"></canvas>
            </div>

            <footer class="controls-panel">
                <button id="btn-capture" class="control-btn">자세 캡처</button>
            </footer>
        </div>

    </div><!-- #app-container END -->

    <!-- 애플리케이션 로직 스크립트 연동 -->
    <script src="app.js"></script>
</body>
</html>
